services:
  postgres:
    image: postgres:16-alpine
    container_name: archiveai-postgres
    environment:
      POSTGRES_USER: archiveai
      POSTGRES_PASSWORD: archiveai_password
      POSTGRES_DB: archiveai_chat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
